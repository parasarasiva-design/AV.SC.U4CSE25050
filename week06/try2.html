<html>
<head>
<style>

.container{
    display:grid;
    grid-template-columns: repeat(3, 1fr); /* side by side */
    gap: 20px;
    padding: 20px;
}

.card{
    background: white;
    padding: 10px;
    text-align: center;
    border-radius: 10px;
}

.card img{
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

.card h1{
    color:#333;
}

.card button{
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.card button:hover{
    background-color: #b8860b;
    color:white;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h1>Sofa</h1>
        <img src="sofa.jpg">
        <button>Contact</button>
    </div>

    <div class="card">
        <h1>Bed</h1>
        <img src="bed.jpg">
        <button>Contact</button>
    </div>

    <div class="card">
        <h1>Cupboards</h1>
        <img src="cupboard.jpg">
        <button>Contact</button>
    </div>

</div>

</body>
</html>
