<style>

body{

.container{

}

.menu li{
margin:15px 0;
}

.menu a{
text-decoration:none;
color:#222;
font-size:18px;
}

.menu a:hover{
color:#ff9792; 
}

.content{
grid-area:content;
background:#f7fbff;
padding:15px;
}

.content iframe{
width:100%;
height:100%;
border:none;
}

.footer{
grid-area:footer;
background:#87b7ff;
color:white;
text-align:center;
font-size:20px;
padding-top:30px;
